<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的个人主页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      max-width: 420px;
      width: 100%;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">👤</div>
    <h1>Easyang888</h1>
    <p>
      这里是我的个人主页。<br>
      我是一名开发者。
    </p>

    <div class="links">
      <a href="https://github.com/Easyang888" target="_blank">GitHub</a>
      <a href="mailto:Ins7786321@163.com">Email</a>
      <a href="#">博客</a>
    </div>

    <footer>
      © 2026 Easyang888
    </footer>
  </div>

</body>
</html>
