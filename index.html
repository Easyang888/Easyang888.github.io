<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Easyang888 · Tech Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0b0f1a;
  color: #e5e7eb;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景粒子 */
#bg {
  position: fixed;
  inset: 0;
  z-index: -2;
}

/* 光束容器 */
#beams {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

.beam {
  position: absolute;
  width: 2px;
  height: 100%;
  background: linear-gradient(
    180deg,
    transparent,
    rgba(56,189,248,.9),
    transparent
  );
  animation: beamMove 6s linear infinite;
}

@keyframes beamMove {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

/* 卡片 */
.card {
  position: relative;
  z-index: 1;
  margin: auto;
  margin-top: 10vh;
  max-width: 520px;
  background: rgba(30,41,59,.85);
  backdrop-filter: blur(14px);
  padding: 2rem;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 0 80px rgba(56,189,248,.2);
}

.avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  margin: 0 auto 1rem;
  background: linear-gradient(135deg,#38bdf8,#818cf8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
}

h1 {
  font-size: 1.6rem;
  margin-bottom: .4rem;
}

.typing {
  color: #38bdf8;
  font-size: 1rem;
  height: 1.5em;
  margin-bottom: 1.2rem;
}

p {
  color: #94a3b8;
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.links {
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
}

.links a {
  color: #38bdf8;
  text-decoration: none;
  font-size: .95rem;
}

.links a:hover {
  text-decoration: underline;
}

footer {
  margin-top: 1.5rem;
  font-size: .85rem;
  color: #64748b;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div id="beams"></div>

<div class="card">
  <div class="avatar">👤</div>
  <h1>Easyang888</h1>
  <div class="typing" id="typing"></div>

  <p>
    这里是我的个人主页。<br>
    我是一名开发者 / 技术探索者。
  </p>

  <div class="links">
    <a href="https://github.com/Easyang888" target="_blank">GitHub</a>
    <a href="mailto:Ins7786321@163.com">Email</a>
    <a href="#">博客</a>
  </div>

  <footer>© 2026 Easyang888</footer>
</div>

<script>
/* ===== 雪花粒子 ===== */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w,h;
resize();
window.addEventListener('resize', resize);
function resize(){
  w = canvas.width = innerWidth;
  h = canvas.height = innerHeight;
}

const particles = Array.from({length: 120}, () => ({
  x: Math.random()*w,
  y: Math.random()*h,
  r: Math.random()*1.2+.5,
  s: Math.random()*.6+.3
}));

function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#38bdf8';
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.s;
    if(p.y>h) p.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

/* ===== 多条光束 + 鼠标跟随 ===== */
const beams = document.getElementById('beams');
for(let i=0;i<6;i++){
  const b = document.createElement('div');
  b.className = 'beam';
  b.style.left = `${10+i*15}%`;
  beams.appendChild(b);
}

document.addEventListener('mousemove', e=>{
  beams.querySelectorAll('.beam').forEach((b,i)=>{
    const dx = (e.clientX/w)*100;
    b.style.left = `${dx + (i-2.5)*5}%`;
  });
});

/* ===== 打字机效果 ===== */
const text = '开发者 · 技术探索者 · 持续进化中';
const el = document.getElementById('typing');
let i=0;
(function type(){
  if(i<=text.length){
    el.textContent = text.slice(0,i++);
    setTimeout(type, 90);
  }
})();
</script>

</body>
</html>
